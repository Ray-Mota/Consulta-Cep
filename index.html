<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta CEP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
<header>
    <div class="logo">CEP <span>consulta de endereços</span></div>
</header>
 
<main>
    <h1>Consulta de CEP</h1>
    <p class="subtitle">Digite um CEP para ver o endereço e localização no mapa.</p>
 
    <div class="search-box">
        <input id="cepID" placeholder="Ex: 01310-100" maxlength="9">
        <button onclick="buscarCEP()">Buscar</button>
        <button onclick="window.location.reload()">&#x21BA;</button>
    </div>
 
    <div id="resultado">
        <div class="resultado-grid">
            <div class="resultado-item">
                <label>Cidade</label>
                <p id="res-cidade">—</p>
            </div>
            <div class="resultado-item">
                <label>Estado</label>
                <p id="res-estado">—</p>
            </div>
            <div class="resultado-item">
                <label>Rua</label>
                <p id="res-rua">—</p>
            </div>
            <div class="resultado-item">
                <label>Bairro</label>
                <p id="res-bairro">—</p>
            </div>
        </div>
    </div>
 
    <div id="mapa-wrapper">
        <div id="mapa"></div>
    </div>
</main>
 
<footer>
    Dados: BrasilAPI · Mapa: OpenStreetMap
</footer>
    <script src="script.js"></script>

</body>
</html>
